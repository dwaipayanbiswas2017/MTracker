<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f172a',
                        cardbg: '#1e293b',
                        brand: '#2563eb',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="w-full max-w-md p-4 md:p-8 space-y-6 bg-slate-800 rounded-lg shadow-lg border border-slate-700">
        <h1 class="text-2xl font-bold text-center">Login</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500/20 text-red-300 p-3 rounded text-sm">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}
        <form action="/login" method="POST" class="space-y-4">
            <!-- <div>
                <label class="block text-sm font-medium text-slate-400">Name</label>
                <input type="text" name="name" required class="w-full p-2 mt-1 bg-slate-700 border border-slate-600 rounded focus:outline-none focus:border-blue-500">
            </div> -->
            <div>
                <label class="block text-sm font-medium text-slate-400">Username</label>
                <input type="text" name="username" required class="w-full p-2 mt-1 bg-slate-700 border border-slate-600 rounded focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400">Password</label>
                <input type="password" name="password" required class="w-full p-2 mt-1 bg-slate-700 border border-slate-600 rounded focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full py-2 font-bold text-white bg-blue-600 rounded hover:bg-blue-500">Login</button>
        </form>
        <p class="text-sm text-center text-slate-400">
            Don't have an account? <a href="/register" class="text-blue-400 hover:underline">Register</a>
        </p>
    </div>
</body>
</html>
